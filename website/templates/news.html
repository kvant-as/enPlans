{% extends "base.html" %}
{% block title %}Новости - EnPlans{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/news.css') }}">
{% endblock %}

{% block content %}
<div class="news_page">
    <div class="news_filters">
        <div class="filter_group">
            <button class="filter_btn active" data-filter="all">Все новости</button>
            <button class="filter_btn" data-filter="published">Опубликованные</button>
        </div>
        <div class="filter_sort">
            <button class="sort_btn" data-sort="date">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18M3 12h18M3 18h18"/>
                    <path d="M16 6l3-3 3 3"/>
                    <path d="M19 3v18"/>
                </svg>
                По дате
            </button>
            <button class="sort_btn" data-sort="views">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                По просмотрам
            </button>
        </div>
    </div>

    <!-- Сетка новостей -->
    <div class="news_grid" id="newsGrid"></div>

    <!-- Пагинация -->
    <div class="news_pagination" id="pagination">
        <button class="page_btn prev" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <div class="page_numbers" id="pageNumbers"></div>
        <button class="page_btn next">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </button>
    </div>
</div>

<script>
let newsData = [];
let currentPage = 1;
let currentFilter = 'all';
let currentSort = 'date';
let totalPages = 1;
let isLoading = false;

async function loadNews() {
    if (isLoading) return;
    isLoading = true;
    showLoading();
    
    try {
        const response = await fetch(`/api/news?page=${currentPage}&per_page=9&filter=${currentFilter}&sort=${currentSort}`);
        const data = await response.json();
        
        newsData = data.news;
        totalPages = data.pages;
        
        renderNews();
        updatePagination();
        updateStats(data.total, data.total_views || 0);
    } catch (error) {
        console.error('Ошибка:', error);
        showError();
    } finally {
        isLoading = false;
        hideLoading();
    }
}

function renderNews() {
    const grid = document.getElementById('newsGrid');
    
    if (!newsData.length) {
        grid.innerHTML = `
            <div class="empty_state">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1M19 20a2 2 0 002-2V8a2 2 0 00-2-2h-4a2 2 0 00-2 2v10a2 2 0 002 2h4z"/>
                </svg>
                <h3>Новостей пока нет</h3>
                <p>Следите за обновлениями — новости появятся скоро</p>
            </div>
        `;
        return;
    }
    
    grid.innerHTML = newsData.map(news => `
        <div class="news_card" onclick="viewNews(${news.id})">
            <div class="news_card_badge ${news.is_published ? 'published' : 'draft'}">
                ${news.is_published ? 'Опубликовано' : 'Черновик'}
            </div>
            <div class="news_card_image">
                ${news.image_url ? 
                    `<img src="{{ url_for('static', filename='img/news/') }}${news.image_url}" alt="${escapeHtml(news.title)}">` :
                    `<div class="image_placeholder">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" 
                                  d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1M19 20a2 2 0 002-2V8a2 2 0 00-2-2h-4a2 2 0 00-2 2v10a2 2 0 002 2h4z"/>
                        </svg>
                    </div>`
                }
            </div>
            <div class="news_card_content">
                <div class="news_card_meta">
                    <span class="news_card_date">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        ${formatDate(news.published_at || news.created_at)}
                    </span>
                </div>
                <h3 class="news_card_title">${escapeHtml(news.title)}</h3>
                <p class="news_card_excerpt">${escapeHtml(news.content.substring(0, 120))}${news.content.length > 120 ? '...' : ''}</p>
                <div class="news_card_footer">
                    <div class="news_card_stats">
                        <div class="news_stat">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            ${news.views_count || 0}
                        </div>
                    </div>
                    <div class="read_more">
                        Читать
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 5l7 7-7 7"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

function viewNews(newsId) {
    window.location.href = `/news/${newsId}`;
}

function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    const now = new Date();
    const diff = now - date;
    const days = Math.floor(diff / 86400000);
    const months = Math.floor(days / 30);
    
    if (days < 1) return 'Сегодня';
    if (days < 7) return `${days} дн. назад`;
    if (days < 30) return `${Math.floor(days / 7)} нед. назад`;
    if (months < 12) return `${months} мес. назад`;
    return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function updatePagination() {
    const pageNumbers = document.getElementById('pageNumbers');
    const prevBtn = document.querySelector('.page_btn.prev');
    const nextBtn = document.querySelector('.page_btn.next');
    
    if (totalPages <= 1) {
        pageNumbers.innerHTML = '';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
    }
    
    let pagesHtml = '';
    const startPage = Math.max(1, currentPage - 2);
    const endPage = Math.min(totalPages, currentPage + 2);
    
    if (startPage > 1) {
        pagesHtml += `<div class="page_number" onclick="goToPage(1)">1</div>`;
        if (startPage > 2) pagesHtml += `<div class="page_number disabled">...</div>`;
    }
    
    for (let i = startPage; i <= endPage; i++) {
        pagesHtml += `<div class="page_number ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</div>`;
    }
    
    if (endPage < totalPages) {
        if (endPage < totalPages - 1) pagesHtml += `<div class="page_number disabled">...</div>`;
        pagesHtml += `<div class="page_number" onclick="goToPage(${totalPages})">${totalPages}</div>`;
    }
    
    pageNumbers.innerHTML = pagesHtml;
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages;
}

function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    loadNews();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateStats(totalNews, totalViews) {
    document.getElementById('totalNews').textContent = totalNews;
    document.getElementById('totalViews').textContent = totalViews;
}

function showLoading() {
    const grid = document.getElementById('newsGrid');
    if (grid.children.length === 0) {
        grid.innerHTML = `
            <div class="loading_state">
                <div class="loading_spinner"></div>
                <p style="color: var(--text-subtitle);">Загрузка новостей...</p>
            </div>
        `;
    }
}

function hideLoading() {
    const loadingDiv = document.querySelector('.loading_state');
    if (loadingDiv && newsData.length === 0) {
        // Оставляем, если нет данных
    }
}

function showError() {
    document.getElementById('newsGrid').innerHTML = `
        <div class="empty_state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <h3>Ошибка загрузки</h3>
            <p>Попробуйте обновить страницу</p>
            <button class="submit-button" onclick="loadNews()" style="margin-top: 20px;">Повторить</button>
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', () => {
    loadNews();
    
    document.querySelectorAll('.filter_btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter_btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            currentPage = 1;
            loadNews();
        });
    });
    
    document.querySelectorAll('.sort_btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentSort = btn.dataset.sort;
            currentPage = 1;
            loadNews();
        });
    });
    
    document.querySelector('.page_btn.prev')?.addEventListener('click', () => goToPage(currentPage - 1));
    document.querySelector('.page_btn.next')?.addEventListener('click', () => goToPage(currentPage + 1));
});
</script>
{% endblock %}
